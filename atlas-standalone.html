<!DOCTYPE html>
<html lang="pt-BR">
<head>
<!-- Versão tudo-em-um (CSS + dados embutidos). Para manter o projeto, use a versão de 3 arquivos: index.html + styles.css + data.js -->
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Atlas do Desenvolvimento de Jogos</title>
<meta name="description" content="Um índice de todas as áreas, disciplinas e termos da indústria de jogos.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Anton&family=Archivo:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* =============================================================
   ATLAS — estilos
   Direção: "guia de campo / índice editorial". Tipografia pesada
   e condensada (Anton) sobre papel quente. A cor só aparece para
   identificar a FAMÍLIA de cada área — em nenhum outro lugar.
   ============================================================= */

:root {
  --paper:    #E9E5DB;   /* fundo da página (putty quente)        */
  --surface:  #F4F2EB;   /* cartões e painéis                     */
  --surface-2:#FBFAF5;   /* destaque mais claro                   */
  --ink:      #19170F;   /* texto / traços                        */
  --ink-soft: #5B554A;   /* texto secundário                      */
  --ink-mute: #908A7C;   /* legendas, meta                        */
  --line:     #CDC7B7;   /* hairlines                             */
  --line-2:   #DED9CB;

  /* cores de família (definidas também em data.js) */
  --fam-craft:      #C8432E;
  --fam-tech:       #2347E8;
  --fam-production: #1E7A4B;
  --fam-business:   #B8791A;
  --fam-community:  #7A3DB8;

  --maxw: 1240px;
  --radius: 3px;
  --shadow: 0 1px 0 var(--line), 0 2px 14px rgba(25,23,15,.05);
}

* { box-sizing: border-box; }

html { -webkit-text-size-adjust: 100%; }

body {
  margin: 0;
  background: var(--paper);
  color: var(--ink);
  font-family: "Archivo", system-ui, sans-serif;
  font-size: 16px;
  line-height: 1.62;
  font-feature-settings: "ss01";
  -webkit-font-smoothing: antialiased;
}

a { color: inherit; }

::selection { background: var(--ink); color: var(--paper); }

/* ---------- utilitários tipográficos ---------- */
.display {
  font-family: "Anton", "Archivo", sans-serif;
  font-weight: 400;
  text-transform: uppercase;
  letter-spacing: .005em;
  line-height: .92;
}
.eyebrow {
  font-family: "IBM Plex Mono", monospace;
  font-size: .68rem;
  letter-spacing: .18em;
  text-transform: uppercase;
  color: var(--ink-mute);
}
.mono { font-family: "IBM Plex Mono", monospace; }

/* =============================================================
   MASTHEAD
   ============================================================= */
.masthead {
  border-bottom: 2px solid var(--ink);
  background: var(--paper);
}
.masthead__inner {
  max-width: var(--maxw);
  margin: 0 auto;
  padding: 34px 28px 26px;
}
.masthead__kicker {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 14px;
}
.masthead__kicker .dot {
  width: 11px; height: 11px; background: var(--ink);
  display: inline-block;
}
.masthead h1 {
  margin: 0;
  font-size: clamp(2.6rem, 7.2vw, 6rem);
}
.masthead h1 .thin { color: var(--ink); -webkit-text-stroke: 0; }
.masthead__sub {
  margin: 16px 0 0;
  max-width: 54ch;
  color: var(--ink-soft);
  font-size: 1.02rem;
}
.masthead__sub .strike {
  color: var(--ink-mute);
  text-decoration: line-through;
  text-decoration-color: var(--ink);
  text-decoration-thickness: 2px;
  text-decoration-skip-ink: none;
}
.masthead__meta {
  margin-top: 18px;
  display: flex;
  flex-wrap: wrap;
  gap: 8px 22px;
  align-items: baseline;
}
.masthead__meta .stat { display: flex; align-items: baseline; gap: 7px; }
.masthead__meta .stat b {
  font-family: "Anton", sans-serif; font-weight: 400;
  font-size: 1.35rem; letter-spacing: .01em;
}

/* =============================================================
   LAYOUT (sidebar + conteúdo)
   ============================================================= */
.layout {
  max-width: var(--maxw);
  margin: 0 auto;
  padding: 0 28px 80px;
  display: grid;
  grid-template-columns: 272px minmax(0, 1fr);
  gap: 40px;
  align-items: start;
}

/* ---------- sidebar ---------- */
.sidebar {
  position: sticky;
  top: 0;
  align-self: start;
  padding-top: 26px;
  max-height: 100vh;
  display: flex;
  flex-direction: column;
}

.search {
  position: relative;
  margin-bottom: 20px;
}
.search input {
  width: 100%;
  font: inherit;
  font-size: .95rem;
  padding: 12px 36px 12px 14px;
  background: var(--surface-2);
  border: 1.5px solid var(--ink);
  border-radius: var(--radius);
  color: var(--ink);
}
.search input::placeholder { color: var(--ink-mute); }
.search input:focus {
  outline: 3px solid rgba(25,23,15,.18);
  outline-offset: 1px;
}
.search__icon {
  position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
  color: var(--ink-mute); pointer-events: none; font-family: "IBM Plex Mono", monospace;
}
.search__clear {
  position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
  border: 0; background: var(--ink); color: var(--paper);
  width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
  font-size: .8rem; line-height: 1; display: none;
}
.search--has-value .search__icon { display: none; }
.search--has-value .search__clear { display: block; }

.nav { overflow-y: auto; padding-right: 6px; padding-bottom: 30px; }
.nav__item--home { font-weight: 700; color: var(--ink); }
.nav__item--home .num { font-size: 1rem; line-height: 1; }
.nav__divider { height: 1px; background: var(--line); margin: 4px 6px 14px; }
.nav__family { margin-bottom: 16px; }
.nav__family-label {
  display: flex; align-items: center; gap: 8px;
  font-family: "IBM Plex Mono", monospace;
  font-size: .66rem; letter-spacing: .14em; text-transform: uppercase;
  color: var(--ink-soft);
  padding: 0 0 6px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 4px;
}
.nav__family-label .swatch { width: 9px; height: 9px; border-radius: 2px; }
.nav__item {
  width: 100%; text-align: left; background: none; border: 0; cursor: pointer;
  display: flex; align-items: baseline; gap: 9px;
  padding: 5px 6px; border-radius: 3px;
  color: var(--ink-soft); font: inherit; font-size: .9rem;
  line-height: 1.25;
}
.nav__item:hover { background: var(--surface); color: var(--ink); }
.nav__item .num { font-family: "IBM Plex Mono", monospace; font-size: .72rem; color: var(--ink-mute); min-width: 20px; }
.nav__item.is-active { background: var(--ink); color: var(--paper); }
.nav__item.is-active .num { color: var(--paper); opacity: .7; }
.nav__item .count { margin-left: auto; font-family: "IBM Plex Mono", monospace; font-size: .68rem; color: var(--ink-mute); }
.nav__item.is-active .count { color: var(--paper); opacity: .7; }

/* =============================================================
   CONTEÚDO
   ============================================================= */
.content { padding-top: 26px; min-height: 60vh; }

/* ---------- overview (todas as categorias) ---------- */
.overview__head { margin-bottom: 22px; }
.overview__head .eyebrow { display: block; margin-bottom: 8px; }
.overview__head h2 { margin: 0; font-size: clamp(1.5rem, 3vw, 2.1rem); }

.fam-block { margin-bottom: 40px; }
.fam-block__head {
  display: flex; align-items: center; gap: 12px;
  padding-bottom: 10px; margin-bottom: 16px;
  border-bottom: 2px solid var(--ink);
}
.fam-block__bar { width: 26px; height: 14px; border-radius: 2px; }
.fam-block__head h3 {
  margin: 0; font-family: "Anton", sans-serif; font-weight: 400;
  text-transform: uppercase; letter-spacing: .02em; font-size: 1.15rem;
}
.fam-block__head .c { margin-left: auto; }

.cat-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(232px, 1fr));
  gap: 14px;
}
.cat-card {
  text-align: left; cursor: pointer;
  background: var(--surface);
  border: 1px solid var(--line);
  border-left: 4px solid var(--fam);
  border-radius: var(--radius);
  padding: 15px 16px 16px;
  font: inherit; color: inherit;
  transition: transform .12s ease, box-shadow .12s ease, background .12s ease;
}
.cat-card:hover {
  background: var(--surface-2);
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}
.cat-card__top { display: flex; align-items: baseline; gap: 8px; margin-bottom: 8px; }
.cat-card__num { font-family: "IBM Plex Mono", monospace; font-size: .72rem; color: var(--ink-mute); }
.cat-card__count { margin-left: auto; font-family: "IBM Plex Mono", monospace; font-size: .68rem; color: var(--ink-mute); }
.cat-card h4 {
  margin: 0 0 4px; font-family: "Anton", sans-serif; font-weight: 400;
  text-transform: uppercase; letter-spacing: .01em; font-size: 1.18rem; line-height: 1;
}
.cat-card__en { font-family: "IBM Plex Mono", monospace; font-size: .66rem; color: var(--ink-mute); text-transform: uppercase; letter-spacing: .08em; }
.cat-card__desc {
  margin: 9px 0 0; font-size: .86rem; color: var(--ink-soft); line-height: 1.5;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}

/* ---------- categoria (detalhe) ---------- */
.cat { animation: fade .22s ease; }
@keyframes fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

.back {
  display: inline-flex; align-items: center; gap: 7px;
  background: none; border: 0; cursor: pointer; font: inherit;
  font-family: "IBM Plex Mono", monospace; font-size: .74rem;
  letter-spacing: .08em; text-transform: uppercase; color: var(--ink-soft);
  padding: 4px 0; margin-bottom: 18px;
}
.back:hover { color: var(--ink); }

.cat__header { border-top: 8px solid var(--fam); padding-top: 18px; }
.cat__tag {
  display: inline-flex; align-items: center; gap: 7px;
  font-family: "IBM Plex Mono", monospace; font-size: .68rem;
  letter-spacing: .12em; text-transform: uppercase; color: var(--fam);
  font-weight: 600; margin-bottom: 12px;
}
.cat__tag .swatch { width: 9px; height: 9px; border-radius: 2px; background: var(--fam); }
.cat__title-row { display: flex; align-items: flex-start; gap: 14px; flex-wrap: wrap; }
.cat__num {
  font-family: "IBM Plex Mono", monospace; font-size: 1rem; color: var(--ink-mute);
  padding-top: .35em;
}
.cat h2 { margin: 0; font-size: clamp(2rem, 5.2vw, 3.4rem); }
.cat__en { font-family: "IBM Plex Mono", monospace; font-size: .8rem; color: var(--ink-mute); text-transform: uppercase; letter-spacing: .08em; margin-top: 6px; }
.cat__aka { font-size: .9rem; color: var(--ink-soft); font-style: italic; }
.cat__desc { margin: 18px 0 0; max-width: 70ch; font-size: 1.05rem; color: var(--ink); line-height: 1.65; }

.section { margin-top: 38px; }
.section__label {
  display: flex; align-items: center; gap: 10px;
  font-family: "IBM Plex Mono", monospace; font-size: .72rem;
  letter-spacing: .14em; text-transform: uppercase; color: var(--ink);
  padding-bottom: 8px; margin-bottom: 14px;
  border-bottom: 1.5px solid var(--ink);
}
.section__label .c { margin-left: auto; color: var(--ink-mute); }

/* áreas (chips) */
.areas { display: flex; flex-wrap: wrap; gap: 8px; }
.area {
  font-family: inherit;
  border: 1px solid var(--line); background: var(--surface);
  border-radius: var(--radius); padding: 8px 12px;
  font-size: .9rem; color: var(--ink);
}

/* qualquer chip clicável (área, habilidade, ferramenta) */
.chip { cursor: pointer; }
.chip::after { content: "+"; font-family: "IBM Plex Mono", monospace; margin-left: 8px; color: var(--ink-mute); }
.chip:hover { background: var(--surface-2); border-color: var(--ink); }
.chip.is-open { background: var(--surface-2); border-color: var(--ink); }
.chip.is-open::after { content: "–"; }

/* painel de descrição que abre abaixo do chip */
.chip-desc {
  flex-basis: 100%; margin: -2px 0 6px; padding: 10px 12px;
  background: var(--surface-2); border: 1px solid var(--line);
  border-left: 3px solid var(--fam); border-radius: var(--radius);
  font-size: .88rem; color: var(--ink-soft); line-height: 1.55;
}
.chip-desc--wip {
  border-left-style: dashed; border-left-color: var(--line);
  font-family: "IBM Plex Mono", monospace; font-size: .8rem;
  letter-spacing: .04em; color: var(--ink-mute);
}

/* skills / software pills */
.pills { display: flex; flex-wrap: wrap; gap: 7px; }
.pill {
  font-family: inherit;
  font-size: .85rem; padding: 6px 11px;
  border-radius: 100px; border: 1px solid var(--line);
  background: var(--surface); color: var(--ink-soft);
}
.pill--soft { font-family: "IBM Plex Mono", monospace; font-size: .78rem; }

.wip {
  display: inline-flex; align-items: center; gap: 9px;
  margin: 0; padding: 8px 15px;
  font-family: "IBM Plex Mono", monospace;
  font-size: .8rem; letter-spacing: .05em; color: var(--ink-soft);
  background: var(--surface); border: 1px dashed var(--line); border-radius: 100px;
}
.wip__mark {
  width: 26px; height: 9px; border-radius: 2px; opacity: .55;
  background: repeating-linear-gradient(-45deg, var(--ink) 0 5px, var(--surface-2) 5px 10px);
}

/* ---------- resultados de busca ---------- */
.results__head { margin-bottom: 20px; }
.results__head .eyebrow { display: block; margin-bottom: 6px; }
.results__head h2 { margin: 0; font-size: clamp(1.4rem, 3vw, 2rem); }
.results__head .q { color: var(--ink); border-bottom: 3px solid var(--fam-tech); }

.result-cat { margin-bottom: 26px; }
.result-cat__head {
  display: flex; align-items: baseline; gap: 10px;
  border-bottom: 1.5px solid var(--ink); padding-bottom: 7px; margin-bottom: 12px; cursor: pointer;
}
.result-cat__dot { width: 9px; height: 9px; border-radius: 2px; }
.result-cat__head h3 { margin: 0; font-family: "Anton", sans-serif; font-weight: 400; text-transform: uppercase; letter-spacing: .01em; font-size: 1.05rem; }
.result-cat__head .c { margin-left: auto; font-family: "IBM Plex Mono", monospace; font-size: .68rem; color: var(--ink-mute); }
.result-cat__head:hover h3 { text-decoration: underline; }
.result-group { margin: 0 0 10px; }
.result-group__label {
  display: block; margin-bottom: 5px;
  font-family: "IBM Plex Mono", monospace; font-size: .62rem;
  letter-spacing: .12em; text-transform: uppercase; color: var(--ink-mute);
}
mark { background: #FBE7A6; color: var(--ink); padding: 0 1px; border-radius: 2px; }

.empty { padding: 40px 0; color: var(--ink-soft); }
.empty b { font-family: "Anton", sans-serif; font-weight: 400; font-size: 1.4rem; display: block; margin-bottom: 6px; }

/* =============================================================
   RODAPÉ
   ============================================================= */
.foot {
  border-top: 2px solid var(--ink);
  max-width: var(--maxw); margin: 0 auto; padding: 24px 28px 50px;
  display: flex; flex-direction: column; gap: 5px;
  font-family: "IBM Plex Mono", monospace; font-size: .72rem; color: var(--ink-soft);
}
.foot a {
  color: var(--ink);
  text-decoration: underline;
  text-decoration-thickness: 1.5px;
  text-underline-offset: 2px;
}
.foot a:hover { text-decoration-thickness: 2.5px; }

/* =============================================================
   RESPONSIVO
   ============================================================= */
@media (max-width: 900px) {
  .layout { grid-template-columns: 1fr; gap: 0; padding-bottom: 60px; }
  .sidebar {
    position: sticky; top: 0; z-index: 20;
    padding: 12px 0; max-height: none;
    background: var(--paper);
    border-bottom: 1px solid var(--line);
  }
  .search { margin-bottom: 0; }
  .nav { display: none; }
  .content { padding-top: 22px; }
  .masthead__inner { padding: 26px 20px 20px; }
  .layout { padding-left: 20px; padding-right: 20px; }
  .foot { padding-left: 20px; padding-right: 20px; }
}

@media (max-width: 520px) {
  .cat-grid { grid-template-columns: 1fr; }
}

/* acessibilidade */
:focus-visible { outline: 3px solid rgba(25,23,15,.35); outline-offset: 2px; border-radius: 2px; }
@media (prefers-reduced-motion: reduce) {
  * { animation: none !important; transition: none !important; }
}

</style>
</head>
<body>

  <!-- ============ MASTHEAD ============ -->
  <header class="masthead">
    <div class="masthead__inner">
      <div class="masthead__kicker">
        <span class="dot"></span>
        <span class="eyebrow">Índice de Carreiras da Indústria de Jogos · ed. 2025</span>
      </div>
      <h1 class="display">Atlas do<br>Desenvolvimento<br>de Jogos</h1>
      <p class="masthead__sub">Um mapa de <span class="strike">quase</span> todas as áreas</p>
      <div class="masthead__meta">
        <span class="stat"><b id="stat-cats">—</b> <span class="eyebrow">disciplinas</span></span>
        <span class="stat"><b id="stat-areas">—</b> <span class="eyebrow">áreas &amp; termos</span></span>
        <span class="stat"><b id="stat-fams">5</b> <span class="eyebrow">famílias</span></span>
      </div>
    </div>
  </header>

  <!-- ============ LAYOUT ============ -->
  <div class="layout">

    <!-- SIDEBAR: busca + índice -->
    <aside class="sidebar">
      <div class="search" id="search">
        <input id="search-input" type="search" autocomplete="off" spellcheck="false"
               placeholder="Buscar área ou termo…" aria-label="Buscar área ou termo">
        <span class="search__icon">⌕</span>
        <button class="search__clear" id="search-clear" aria-label="Limpar busca">×</button>
      </div>
      <nav class="nav" id="nav" aria-label="Disciplinas"></nav>
    </aside>

    <!-- CONTEÚDO -->
    <main class="content" id="content"></main>
  </div>

  <!-- ============ RODAPÉ ============ -->
  <footer class="foot">
    <span>por <a href="https://www.linkedin.com/in/lucas-keven/" target="_blank" rel="noopener">Lucas Keven</a> · Savant Game Studio</span>
  </footer>

  <!-- ============ DADOS + APP ============ -->
  <script>
/* =============================================================
   ATLAS DE CARREIRAS DO DESENVOLVIMENTO DE JOGOS — dados (taxonomia)
   -------------------------------------------------------------
   Banco de dados do site. Tudo que aparece na tela vem daqui.
   Para editar conteúdo, mexa SÓ neste arquivo.

   Modelo de uma categoria:
   {
     id, n (nº de catálogo), name (PT), nameEn, family, aka?,
     desc,                              // descrição da disciplina
     areas:    [{ name, desc? }],       // sub-áreas / termos
     skills?:  [{ name, desc? }],       // habilidades (opcional)
     software?:[{ name, desc? }]        // ferramentas (opcional)
   }
   Itens também aceitam só "texto" (sem descrição); o site normaliza.
   "family" agrupa as 23 categorias em 5 famílias (cor + navegação).
   ============================================================= */

const FAMILIES = {
  craft: { label: "Criação", color: "#C8432E" },
  tech: { label: "Engenharia", color: "#2347E8" },
  production: { label: "Produção & Operações", color: "#1E7A4B" },
  business: { label: "Negócios", color: "#B8791A" },
  community: { label: "Comunidade & Eventos", color: "#7A3DB8" },
};

const CATEGORIES = [
  {
    id: "programacao", n: 1, name: "Programação", nameEn: "Game Programming",
    family: "tech", aka: "Engenharia de Jogos",
    desc: "O processo de criação e implementação do código que faz o jogo funcionar. Envolve linguagens como C++, C# e Java para construir mecânicas — movimentação, vida, energia, pontuação, diálogos, física e IA. Programadores trabalham junto a designers e artistas para tirar ideias do papel e transformá-las num jogo digital.",
    areas: [
      { name: "AI Programming", desc: "Comportamento de personagens e inimigos: pathfinding, máquinas de estado, árvores de comportamento." },
      { name: "Build & Release Programming", desc: "Automatiza a compilação, empacotamento e distribuição do jogo, garantindo versões estáveis e consistentes." },
      { name: "Developer Relations", desc: "Constrói relacionamento com desenvolvedores por meio de documentação, suporte técnico, eventos e conteúdo educativo." },
      { name: "Development Direction", desc: "Define a visão técnica do projeto, coordenando equipes e direcionando decisões de desenvolvimento." },
      { name: "Engine Programming", desc: "Construção e manutenção do motor do jogo e seus subsistemas centrais." },
      { name: "Gameplay Programming", desc: "Implementa as regras e mecânicas que o jogador sente: controles, combate, sistemas." },
      { name: "Graphics Programming", desc: "Pipeline de renderização, shaders e desempenho visual." },
      { name: "Multiplayer Programming", desc: "Implementa sistemas específicos para jogos multiplayer, sincronizando jogadores, partidas e estados do jogo." },
      { name: "Network Programming", desc: "Desenvolve a infraestrutura de comunicação entre cliente e servidor, priorizando estabilidade, desempenho e baixa latência." },
      { name: "Physics Programming", desc: "Implementa simulações físicas, colisões, movimentação, destruição e interação entre objetos." },
      { name: "Rendering", desc: "Desenvolve e otimiza a forma como gráficos são processados e exibidos na tela." },
      { name: "Tools Programming", desc: "Ferramentas internas que aceleram o trabalho de artistas, designers e da própria equipe." },
      { name: "UI Programming", desc: "Programa interfaces, HUDs, menus e sistemas de interação entre jogador e jogo." },
    ],
    skills: [
      { name: "Lógica e Matemática", desc: "Fundamenta algoritmos, estruturas de dados e resolução eficiente de problemas computacionais." },
      { name: "Resolução de Problemas", desc: "Analisa desafios técnicos e desenvolve soluções robustas, eficientes e escaláveis." },

      { name: "Business Intelligence", desc: "Analisa dados de mercado para apoiar decisões estratégicas." },
      { name: "Communications", desc: "Coordena a comunicação institucional entre empresa, parceiros e público." },
      { name: "Consumer Research", desc: "Pesquisa comportamento, necessidades e expectativas dos consumidores." },
      { name: "Customer Support", desc: "Presta suporte aos clientes solucionando dúvidas e problemas." },
      { name: "Distribution", desc: "Planeja a distribuição de produtos em canais físicos e digitais." },
      { name: "Ecommerce", desc: "Gerencia operações comerciais em lojas online." },
      { name: "Manufacturing", desc: "Coordena produção física de produtos e materiais comerciais." },
      { name: "Market Research", desc: "Pesquisa tendências, concorrentes e oportunidades de mercado." },
      { name: "Media Buying", desc: "Planeja e compra espaços publicitários em diferentes plataformas." },
      { name: "Merchandising", desc: "Desenvolve produtos licenciados e materiais promocionais." },
      { name: "Monetization", desc: "Planeja estratégias para geração de receita com produtos e serviços." },
      { name: "Packaging", desc: "Desenvolve embalagens considerando identidade visual, proteção e experiência do consumidor." },
      { name: "Partnerships", desc: "Constrói e mantém parcerias estratégicas entre empresas e organizações." },
      { name: "Procurement", desc: "Gerencia aquisição de produtos, serviços e fornecedores." },
      { name: "Product Management", desc: "Define estratégia, evolução e ciclo de vida dos produtos." },
      { name: "Retail", desc: "Gerencia relacionamento com varejistas e canais de venda." },
      { name: "Sales", desc: "Conduz negociações e vendas de produtos ou serviços." },
      { name: "Sponsorships", desc: "Desenvolve e administra acordos de patrocínio." },
      { name: "Supply Chain", desc: "Gerencia toda a cadeia de suprimentos, da aquisição à entrega." },
      { name: "Ticketing", desc: "Administra sistemas de venda, emissão e controle de ingressos." },
    ],
  },
];

</script>
  <script>
  (function () {
    "use strict";

    /* ---------- referências de DOM ---------- */
    const $nav     = document.getElementById("nav");
    const $content = document.getElementById("content");
    const $input   = document.getElementById("search-input");
    const $search  = document.getElementById("search");
    const $clear   = document.getElementById("search-clear");

    /* ---------- estado ---------- */
    const state = { query: "", selected: null };

    /* ---------- helpers ---------- */
    const famColor = (f) => FAMILIES[f] ? FAMILIES[f].color : "var(--ink)";
    const esc = (s) => String(s).replace(/[&<>"]/g, (c) =>
      ({ "&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;" }[c]));
    // remove acentos p/ busca tolerante
    const norm = (s) => s.toLowerCase()
      .normalize("NFD").replace(/[\u0300-\u036f]/g, "");

    function highlight(text, q) {
      if (!q) return esc(text);
      const nt = norm(text), nq = norm(q);
      const i = nt.indexOf(nq);
      if (i === -1) return esc(text);
      return esc(text.slice(0, i)) + "<mark>" +
             esc(text.slice(i, i + q.length)) + "</mark>" +
             esc(text.slice(i + q.length));
    }

    /* ---------- métricas do cabeçalho ---------- */
    const totalAreas = CATEGORIES.reduce((s, c) => s + c.areas.length, 0);
    document.getElementById("stat-cats").textContent  = CATEGORIES.length;
    document.getElementById("stat-areas").textContent = totalAreas;

    /* agrupa categorias por família, na ordem de FAMILIES */
    function byFamily() {
      return Object.keys(FAMILIES).map((key) => ({
        key,
        ...FAMILIES[key],
        cats: CATEGORIES.filter((c) => c.family === key),
      }));
    }

    /* =========================================================
       NAV (sidebar)
       ========================================================= */
    function renderNav() {
      let html = `<button class="nav__item nav__item--home" data-home="1">
          <span class="num" aria-hidden="true">≡</span>
          <span>Índice</span>
        </button>
        <div class="nav__divider"></div>`;
      byFamily().forEach((fam) => {
        html += `<div class="nav__family">
          <div class="nav__family-label">
            <span class="swatch" style="background:${fam.color}"></span>${esc(fam.label)}
          </div>`;
        fam.cats.forEach((c) => {
          html += `<button class="nav__item" data-id="${c.id}">
            <span class="num">${String(c.n).padStart(2,"0")}</span>
            <span>${esc(c.name)}</span>
            <span class="count">${c.areas.length}</span>
          </button>`;
        });
        html += `</div>`;
      });
      $nav.innerHTML = html;
      $nav.querySelectorAll(".nav__item[data-id]").forEach((b) =>
        b.addEventListener("click", () => select(b.dataset.id)));
      $nav.querySelector("[data-home]").addEventListener("click", () => {
        state.query = ""; $input.value = "";
        $search.classList.remove("search--has-value");
        goOverview();
      });
      markActiveNav();
    }
    function markActiveNav() {
      const onIndex = !state.selected && !state.query;
      $nav.querySelectorAll(".nav__item").forEach((b) => {
        if (b.dataset.home) b.classList.toggle("is-active", onIndex);
        else b.classList.toggle("is-active", b.dataset.id === state.selected);
      });
    }

    /* =========================================================
       OVERVIEW — todas as categorias por família
       ========================================================= */
    function renderOverview() {
      let html = `<div class="overview__head">
        <span class="eyebrow">Sumário</span>
        <h2 class="display">As 5 famílias do desenvolvimento</h2>
      </div>`;

      byFamily().forEach((fam) => {
        html += `<section class="fam-block" style="--fam:${fam.color}">
          <div class="fam-block__head">
            <span class="fam-block__bar" style="background:${fam.color}"></span>
            <h3>${esc(fam.label)}</h3>
            <span class="c eyebrow">${fam.cats.length} disciplinas</span>
          </div>
          <div class="cat-grid">`;
        fam.cats.forEach((c) => {
          html += `<button class="cat-card" data-id="${c.id}" style="--fam:${fam.color}">
            <div class="cat-card__top">
              <span class="cat-card__num">${String(c.n).padStart(2,"0")}</span>
              <span class="cat-card__count">${c.areas.length} áreas</span>
            </div>
            <h4>${esc(c.name)}</h4>
            <div class="cat-card__en">${esc(c.nameEn)}</div>
            <p class="cat-card__desc">${esc(c.desc)}</p>
          </button>`;
        });
        html += `</div></section>`;
      });

      $content.innerHTML = html;
      $content.querySelectorAll(".cat-card").forEach((b) =>
        b.addEventListener("click", () => select(b.dataset.id)));
    }

    /* =========================================================
       CATEGORIA (detalhe)
       ========================================================= */
    function renderCategory(c) {
      const color = famColor(c.family);
      const fam = FAMILIES[c.family];

      // normaliza itens: "texto" → { name }  (permite { name, desc } no futuro)
      const norm0 = (it) => typeof it === "string" ? { name: it } : it;
      const groups = {
        areas:    (c.areas    || []).map(norm0),
        skills:   (c.skills   || []).map(norm0),
        software: (c.software || []).map(norm0),
      };
      const chips = (key, cls) => groups[key].map((it, i) =>
        `<button class="${cls} chip" data-g="${key}" data-i="${i}">${esc(it.name)}</button>`).join("");

      const areasHtml = chips("areas", "area");

      let skillsHtml = "";
      if (groups.skills.length) {
        skillsHtml = section("Habilidades", groups.skills.length,
          `<div class="pills">${chips("skills","pill")}</div>`);
      }

      let swHtml = "";
      if (groups.software.length) {
        swHtml = section("Ferramentas & Software", groups.software.length,
          `<div class="pills">${chips("software","pill pill--soft")}</div>`);
      }

      const filled = groups.skills.length || groups.software.length;
      const wip = `<p class="wip"><span class="wip__mark" aria-hidden="true"></span>Em construção</p>`;
      const note = filled ? "" :
        `<section class="section">
          <div class="section__label">Habilidades</div>
          ${wip}
        </section>
        <section class="section">
          <div class="section__label">Ferramentas &amp; Software</div>
          ${wip}
        </section>`;

      $content.innerHTML = `<div class="cat" style="--fam:${color}">
        <button class="back" id="back">← Sumário</button>
        <div class="cat__header">
          <span class="cat__tag"><span class="swatch"></span>${esc(fam.label)}</span>
          <div class="cat__title-row">
            <span class="cat__num">${String(c.n).padStart(2,"0")}</span>
            <div>
              <h2 class="display">${esc(c.name)}</h2>
              <div class="cat__en">${esc(c.nameEn)}${c.aka?` &nbsp;·&nbsp; <span class="cat__aka">também: ${esc(c.aka)}</span>`:""}</div>
            </div>
          </div>
          <p class="cat__desc">${esc(c.desc)}</p>
        </div>

        ${section("Áreas & Termos", groups.areas.length, `<div class="areas">${areasHtml}</div>`)}
        ${skillsHtml}
        ${swHtml}
        ${note}
      </div>`;

      document.getElementById("back").addEventListener("click", goOverview);

      // cada item (área, habilidade, ferramenta) abre sua descrição
      attachChipExpand((btn) => groups[btn.dataset.g][+btn.dataset.i]);
    }

    // torna cada .chip de $content clicável: abre/fecha sua descrição (ou [Em Construção])
    function attachChipExpand(getItem) {
      $content.querySelectorAll(".chip").forEach((btn) => {
        btn.addEventListener("click", () => {
          const open = btn.classList.toggle("is-open");
          const next = btn.nextElementSibling;
          if (open) {
            const it = getItem(btn) || {};
            const d = document.createElement("div");
            if (it.desc) { d.className = "chip-desc"; d.textContent = it.desc; }
            else { d.className = "chip-desc chip-desc--wip"; d.textContent = "[Em Construção]"; }
            btn.after(d);
          } else if (next && next.classList.contains("chip-desc")) {
            next.remove();
          }
        });
      });
    }

    function section(label, count, inner) {
      return `<section class="section">
        <div class="section__label">${esc(label)}<span class="c">${count}</span></div>
        ${inner}
      </section>`;
    }

    /* =========================================================
       BUSCA / RESULTADOS
       ========================================================= */
    function renderResults(q) {
      const nq = norm(q);
      const n0 = (it) => typeof it === "string" ? { name: it } : it;
      const hits = [];
      CATEGORIES.forEach((c) => {
        const nameMatch = norm(c.name).includes(nq) || norm(c.nameEn).includes(nq)
          || (c.aka && norm(c.aka).includes(nq));
        const areas    = c.areas.map(n0).filter((a) => norm(a.name).includes(nq));
        const skills   = (c.skills   || []).map(n0).filter((s) => norm(s.name).includes(nq));
        const software = (c.software || []).map(n0).filter((s) => norm(s.name).includes(nq));
        const count = areas.length + skills.length + software.length;
        if (nameMatch || count) hits.push({ c, areas, skills, software, count });
      });

      const totalHits = hits.reduce((s,h)=>s+h.count,0);

      if (!hits.length) {
        $content.innerHTML = `<div class="empty">
          <b>Nada encontrado</b>
          Nenhuma área, habilidade ou ferramenta corresponde a “${esc(q)}”. Tente outro termo.
        </div>`;
        return;
      }

      let html = `<div class="results__head">
        <span class="eyebrow">${totalHits} resultado(s) em ${hits.length} disciplina(s)</span>
        <h2 class="display">Busca: <span class="q">${esc(q)}</span></h2>
      </div>`;

      const flatItems = [];
      const group = (label, items, cls) => {
        if (!items.length) return "";
        const chips = items.map((it) => {
          const ref = flatItems.push(it) - 1;
          return `<button class="${cls} chip" data-ref="${ref}">${highlight(it.name, q)}</button>`;
        }).join("");
        const container = cls.startsWith("pill") ? "pills" : "areas";
        return `<div class="result-group"><span class="result-group__label">${label}</span><div class="${container}">${chips}</div></div>`;
      };

      hits.forEach(({ c, areas, skills, software, count }) => {
        const color = famColor(c.family);
        html += `<section class="result-cat">
          <div class="result-cat__head" data-id="${c.id}">
            <span class="result-cat__dot" style="background:${color}"></span>
            <h3>${highlight(c.name, q)}</h3>
            <span class="c">${highlight(c.nameEn, q)}${count ? ` · ${count}` : ""}</span>
          </div>` +
          group("Áreas", areas, "area") +
          group("Habilidades", skills, "pill") +
          group("Ferramentas & Software", software, "pill pill--soft") +
        `</section>`;
      });

      $content.innerHTML = html;
      $content.querySelectorAll(".result-cat__head").forEach((h) =>
        h.addEventListener("click", () => select(h.dataset.id)));
      attachChipExpand((btn) => flatItems[+btn.dataset.ref]);
    }

    /* =========================================================
       ROTEAMENTO / RENDER
       ========================================================= */
    function render() {
      if (state.query) { renderResults(state.query); markActiveNav(); return; }
      if (state.selected) {
        const c = CATEGORIES.find((x) => x.id === state.selected);
        if (c) { renderCategory(c); markActiveNav(); return; }
      }
      renderOverview();
      markActiveNav();
    }

    function select(id) {
      state.selected = id;
      state.query = "";
      $input.value = "";
      $search.classList.remove("search--has-value");
      if (location.hash !== "#" + id) history.pushState(null, "", "#" + id);
      render();
    }
    function goOverview() {
      state.selected = null;
      if (location.hash) history.pushState(null, "", location.pathname);
      render();
    }

    /* ---------- busca (input) ---------- */
    let t;
    $input.addEventListener("input", () => {
      const v = $input.value.trim();
      $search.classList.toggle("search--has-value", v.length > 0);
      clearTimeout(t);
      t = setTimeout(() => { state.query = v; render(); }, 90);
    });
    $clear.addEventListener("click", () => {
      $input.value = ""; state.query = "";
      $search.classList.remove("search--has-value");
      $input.focus(); render();
    });
    // tecla "/" foca a busca
    document.addEventListener("keydown", (e) => {
      if (e.key === "/" && document.activeElement !== $input) { e.preventDefault(); $input.focus(); }
      if (e.key === "Escape" && document.activeElement === $input && $input.value) {
        $input.value=""; state.query=""; $search.classList.remove("search--has-value"); render();
      }
    });

    /* ---------- hash inicial / voltar do navegador ---------- */
    function fromHash() {
      const id = decodeURIComponent(location.hash.replace(/^#/, ""));
      state.selected = CATEGORIES.some((c) => c.id === id) ? id : null;
    }
    window.addEventListener("popstate", () => { fromHash(); render(); });

    /* ---------- start ---------- */
    renderNav();
    fromHash();
    render();
  })();
  </script>
</body>
</html>
